<text x="76" y="955" fill="#33414b" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="48" font-weight="780" letter-spacing="0">않는다. 잠이 덜 깼고, 고를</text>
<text x="76" y="1015" fill="#33414b" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="48" font-weight="780" letter-spacing="0">게 많고, 부모도 급한 날엔</text>
<text x="76" y="1222" fill="#33414b" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="30" font-weight="760" letter-spacing="0">육아 성장 블로그</text>
<text x="1004" y="1222" fill="#33414b" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="30" font-weight="760" text-anchor="end" letter-spacing="0">02/06</text>
