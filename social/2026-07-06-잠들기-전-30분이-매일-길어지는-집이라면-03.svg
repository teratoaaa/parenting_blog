<stop offset="1" stop-color="#ffece3" />
</linearGradient>
<clipPath id="scene-clip"><rect x="76" y="76" width="928" height="690" rx="34" /></clipPath>
</defs>
<rect width="1080" height="1350" fill="url(#card-bg)" />
<rect x="76" y="76" width="928" height="690" rx="34" fill="rgba(255,255,255,0.72)" /><image href="../assets/bedtime-routine-card-steps.webp" x="76" y="76" width="928" height="690" preserveAspectRatio="xMidYMax slice" clip-path="url(#scene-clip)" /><rect x="76" y="76" width="928" height="690" rx="34" fill="none" stroke="#d86b4f" stroke-opacity="0.35" stroke-width="3" />
