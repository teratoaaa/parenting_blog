<text x="76" y="786" fill="#d86b4f" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="34" font-weight="860" letter-spacing="0">02</text>

<text x="76" y="835" fill="#33414b" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="48" font-weight="780" letter-spacing="0">분 루틴은 “더 빨리</text>
<text x="76" y="895" fill="#33414b" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="48" font-weight="780" letter-spacing="0">재우기”보다 “협상할 일을</text>
<text x="76" y="955" fill="#33414b" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="48" font-weight="780" letter-spacing="0">줄이기”에 가깝다. 씻기,</text>
<text x="76" y="1015" fill="#33414b" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="48" font-weight="780" letter-spacing="0">정리, 책, 불 끄기 순서를</text>
<text x="76" y="1222" fill="#33414b" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="30" font-weight="760" letter-spacing="0">육아 성장 블로그</text>
<text x="1004" y="1222" fill="#33414b" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif" font-size="30" font-weight="760" text-anchor="end" letter-spacing="0">03/06</text>
